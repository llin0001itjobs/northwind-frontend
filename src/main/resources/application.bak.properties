spring.profiles.active=dev
server.port=8082
server.servlet.context-path=/northwind

spring.security.user.name=scott
spring.security.user.password=tiger

management.endpoints.web.exposure.include=health,info,beans,mappings,threaddump,env,configprops
#management.endpoints.web.exposure.exclude=info
management.info.env.enabled=true 

spring.mvc.static-path-pattern=/static/**
spring.resources.static-locations=classpath:/static/

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html


api.dogs.images.random=https://dog.ceo/api/breeds/image/random

api.package.northwind=org.llin.demo.northwind.model
api.package.northwind.excluded=ProductSupplier,User
api.package.northwind.sample=1,2,3,4,5
api.usage=true


view.ellipsis.limit=150

northwind.data-api-uri=http://localhost:8080/northwind-data/api/
northwind.data-api-uri-id=id=
northwind.regex-api-uri=^http://localhost:8080\\/northwind-data\\/api\\/\\w+\\/\\d+\\/\\w+\\?id=(\\w+(?:,\\w+)*)$
northwind.entities-file-json=EntityMenu.json
northwind.entities-addListSubpath=true
northwind.entities-custom-sql-keys=customerOrder/feeRangePerCount,customerOrder/shippingFeePerMonth,product/categoryRatios,product/priceRangePerListPrice,product/priceRangePerStandardCost,purchaseOrderDetail/quantityPerCostRange,purchaseOrderDetail/quantityPerUnitCost
northwind.employee-chunk-size=7
northwind.image-base-path=/src/main/resources/

log4j.rootLogger=DEBUG, console
log4j.appender.console=org.apache.log4j.ConsoleAppender
log4j.appender.console.layout=org.apache.log4j.PatternLayout
log4j.appender.console.layout.ConversionPattern=%d %-5p %c - %m%n

logging.level.org.springframework.security=DEBUG
logging.level.value=DEBUG
logging.level.web=DEBUG
