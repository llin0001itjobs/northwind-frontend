<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="">
<title>Northwind Traders</title>

<!-- Bootstrap core CSS -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css"
	rel="stylesheet"
	th:attr="integrity='sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9'"
	th:attr="crossorigin='anonymous'">

<style>
.bd-placeholder-img {
	font-size: 1.125rem;
	text-anchor: middle;
	-webkit-user-select: none;
	-moz-user-select: none;
	user-select: none;
}

@media ( min-width : 768px) {
	.bd-placeholder-img-lg {
		font-size: 3.5rem;
	}
}

.custom-bg {
	background-size: cover;
	background-image: url("/background/abstract-background-322.jpg")
}

.footer-container {
	position: relative;
}
</style>

<!-- Custom styles for this template -->
<link th:href="@{/css/navbar-top-fixed.css}" rel="stylesheet">
<script
	src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.1.81/build/pdf.min.js"></script>
<script>
	pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.1.81/build/pdf.worker.min.js';
	pdfjsLib.getDocument('/northwind/test-pdf/render-employee-roster').promise.then(function(pdf) {
		pdf.getPage(1).then(function(page) {
			var scale = 1.2;
			var viewport = page.getViewport({
				scale : scale
			});

			var canvas = document.getElementById('pdfViewer');
			var context = canvas.getContext('2d');
			canvas.height = viewport.height;
			canvas.width = viewport.width;

			var renderContext = {
				canvasContext : context,
				viewport : viewport
			};
			page.render(renderContext);
		});
	});
</script>
</head>

<body class="custom-bg container-fluid vh-100">

	<div th:replace="fragments/navbar :: nav"></div>

	<div class="container overflow-auto border mb-2 font-data">
		<canvas id="pdfViewer"></canvas>
	</div>

	<div class="container footer-container">
		<div th:replace="fragments/footer :: footer"></div>
	</div>
	<div th:replace="fragments/script :: div"></div>
</body>

</html>
