<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport"
	content="width=device-width, initial-scale=1, shrink-to-fit=no">
<meta name="description" content="">
<meta name="author" content="">
<title th:text="${'Northwind Traders - Login'}"></title>
<link th:href="@{/css/default-ui.css}" rel="stylesheet" />
<script>
    fetch('/csrf')
        .then(response => response.json())
        .then(data => {
            document.querySelector('input[name="_csrf"]').value = data.token;
        });
</script>
</head>
<body>
	<div class="content">
		<form class="login-form" method="post" th:action="@{/login/submit}">
			<h2>Please sign in</h2>
			<div th:if="${param.error}">
				<p style="color: red;" th:text="${param.message}"></p>
			</div>
			<p>
				<label for="username" class="screenreader">Username</label> <input
					type="text" id="username" name="username" placeholder="Username"
					required autofocus>
			</p>
			<p>
				<label for="password" class="screenreader">Password</label> <input
					type="password" id="password" name="password"
					placeholder="Password" required>
			</p>

			<!-- Automatically include CSRF token -->
			<input type="hidden" th:name="${_csrf.parameterName}"
				th:value="${_csrf.token}" />
			<button type="submit" class="primary">Sign in</button>
		</form>
	</div>
</body>
</html>
