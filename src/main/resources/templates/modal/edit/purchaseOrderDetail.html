<!DOCTYPE html>
<div class="modal fade">
	<div class="modal-dialog modal-dialog-centered">
		<div class="modal-content">
			<div class="modal-header">
				<h5 class="modal-title"
					th:attr="id='editPurchaseOrderDetails-' + ${PurchaseOrderDetails.getId()}">
					Purchase Order
				</h5>
				<button type="button" class="btn-close" data-bs-dismiss="modal"
					aria-label="Close"></button>
				<div class="modal-body">
					<div class="row align-items-end">
						<div class="col-2">Date Received</div>
						<div class="col-10">
							<input type="date"
								th:value="${PurchaseOrderDetails.getDateReceived()}"
								th:field="*{dateReceived}" />
						</div>
					</div>
					<div class="row align-items-end">
						<div class="col-2">Unit Cost</div>
						<div class="col-10">
							<input type="number" step="0.1"
								th:value="${PurchaseOrderDetails.getUnitCost()}"
								th:field="*{unitCost}" />
						</div>
					</div>
					<div class="row align-items-end">
						<div class="col-2">Quantity</div>
						<div class="col-10">
							<input type="number" step="1"
								th:value="${PurchaseOrderDetails.getQuantity()}"
								th:field="*{creationDate}" />
						</div>
					</div>
					<div class="row align-items-end">
						<div class="col-2">Posted To Inventory</div>
						<div class="col-10">
							<select th:value="${PurchaseOrderDetails.getPostedToInventory()}"
									th:field="*{postedToInventory}">
								<option value="false">False</option>
								<option value="true">True</option>
							</select>
						</div>
					</div>
				</div>
				<div class="modal-footer">
					<button type="button" class="btn btn-secondary"
						data-bs-dismiss="modal">Close</button>
				</div>
			</div>
		</div>
	</div>
</div>
