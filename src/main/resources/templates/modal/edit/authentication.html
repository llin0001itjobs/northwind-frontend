<!DOCTYPE html>
<div class="modal fade">
	<div class="modal-dialog modal-dialog-centered">
		<div class="modal-content">
			<div class="modal-header">
				<h5 class="modal-title"
					th:attr="id='editAuthentication-' + ${Authentication.getId()}">
					Authentication
				</h5>
				<button type="button" class="btn-close" data-bs-dismiss="modal"
					aria-label="Close"></button>
				<div class="modal-body">
					<div class="row align-items-end">
						<div class="col-2">Role Type</div>
						<div class="col-10">
							<input type="text" th:value="${Authentication.getRoleType()}" th:field="*{roleType}"/>
						</div>
					</div>
					<div class="row align-items-end">
						<div class="col-2">User Name</div>
						<div class="col-10">
							<input type="text" th:value="${Authentication.getUserName()}" th:field="*{userName}"/>
						</div>
					</div>
					<div class="row align-items-end">
						<div class="col-2">Password</div>
						<div class="col-10">
							<input type="text" th:value="${Authentication.getPassword()}" th:field="*{password}"/>
						</div>
					</div>
				</div>
				<div class="modal-footer">
					<button type="button" class="btn btn-secondary"
						data-bs-dismiss="modal">Close</button>
				</div>
			</div>
		</div>
	</div>
</div>
