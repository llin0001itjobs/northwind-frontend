<!DOCTYPE html>
<div class="modal fade">
	<div class="modal-dialog modal-dialog-centered">
		<div class="modal-content">
			<div class="modal-header">
				<h5 class="modal-title"
					th:attr="id='editOrderDetail-' + ${OrderDetail.getId()}">
					Order Detail
				</h5>
				<button type="button" class="btn-close" data-bs-dismiss="modal"
					aria-label="Close"></button>
				<div class="modal-body">
					<div class="row align-items-end">
						<div class="col-2">Quantity</div>
						<div class="col-10">
							<input type="number" step="0.1"
								th:value="${OrderDetail.getQuantity()}" th:field="*{quantity}" />
						</div>
					</div>
					<div class="row align-items-end">
						<div class="col-2">Unit Price</div>
						<div class="col-10">
							<input type="number" step="0.1"
								th:value="${OrderDetail.getUnitPrice()}" th:field="*{unitPrice}" />
						</div>
					</div>
					<div class="row align-items-end">
						<div class="col-2">Discount</div>
						<div class="col-10">
							<input type="number" step="0.1"
								th:value="${OrderDetail.getDiscount()}" th:field="*{discount}" />
						</div>
					</div>
					<div class="row align-items-end">
						<div class="col-2">Date Allocated</div>
						<div class="col-10">
							<input type="date" th:value="${OrderDetail.getDateAllocated()}"
								th:field="*{dateAllocated}" />
						</div>
					</div>
					<div class="row align-items-end">
						<div class="col-2">Order Status</div>
						<div class="col-10">
							<select th:value="${OrderDetail.getOrderStatus()}"
								th:field="*{orderStatus}">
							</select>
						</div>
					</div>
				</div>
				<div class="modal-footer">
					<button type="button" class="btn btn-secondary"
						data-bs-dismiss="modal">Close</button>
				</div>
			</div>
		</div>
	</div>
</div>
