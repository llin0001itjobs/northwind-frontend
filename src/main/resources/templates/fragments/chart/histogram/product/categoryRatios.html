<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Histogram</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <canvas id="histogramChart"></canvas>

    <script th:inline="javascript">
        /*<![CDATA[*/
        var ctx = document.getElementById('histogramChart').getContext('2d');
        var histogramData = [[${'product/categoryRatios'}]];

        var labels = histogramData.map(item => item.label);
        var dataLong = histogramData.map(item => item.valueLong);
        var dataDouble = histogramData.map(item => item.valueDouble);

        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Count per Category',
                        data: dataLong,
                        backgroundColor: 'rgba(75, 192, 192, 0.2)',
                        borderColor: 'rgba(75, 192, 192, 1)',
                        borderWidth: 1
                    }
                ]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
        /*]]>*/
    </script>
</body>
</html>
