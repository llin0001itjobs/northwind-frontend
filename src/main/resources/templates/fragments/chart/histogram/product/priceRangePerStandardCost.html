<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Histogram</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <canvas id="histogramChart"></canvas>

    <script th:inline="javascript">
        /*<![CDATA[*/
        var ctx = document.getElementById('histogramChart').getContext('2d');
        var histogramData = [[${'product/priceRangePerStandardCost'}]];

        var labels = histogramData.map(item => item.label);
        var data = histogramData.map(item => item.value);

        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Price Range per Standard Cost',
                    data: data,
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
        /*]]>*/
    </script>
</body>
</html>
