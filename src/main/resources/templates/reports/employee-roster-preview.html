<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="">
<title th:text="${'Northwind Traders - Employee Roster Preview'}"></title>

<!-- Bootstrap core CSS -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script
	src="https://cdn.jsdelivr.net/npm/pdfjs-dist/build/pdf.min.js"></script>

<script th:inline="javascript">
let currentPage = 1;
let pdfDoc = null;

		function renderPage(pageNum) {
		    pdfDoc.getPage(pageNum).then(function(page) {
		        var scale = 1.2;
		        var viewport = page.getViewport({ scale: scale });
		        var canvas = document.getElementById('pdfViewer');
		        var context = canvas.getContext('2d');
		        canvas.height = viewport.height;
		        canvas.width = viewport.width;
		        var renderContext = { canvasContext: context, viewport: viewport };
		        page.render(renderContext);
		    });
		}
		pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist/build/pdf.worker.min.js';
		pdfjsLib.getDocument(/*[[@{/employee-roster/render?disposition=inline}]]*/).promise
		    .then(function(pdf) {
		        pdfDoc = pdf;
		        renderPage(currentPage);
		    })	
		    .catch(function(error) {
		        console.error('Error loading PDF:', error);
		        alert('Failed to load PDF preview. Please try again later.');
		    });
		
		// Add navigation buttons
		document.getElementById('prevPage').addEventListener('click', () => {
		    if (currentPage > 1) {
		        currentPage--;
		        renderPage(currentPage);
		    }
		});
		document.getElementById('nextPage').addEventListener('click', () => {
		    if (currentPage < pdfDoc.numPages) {
		        currentPage++;
		        renderPage(currentPage);
		    }
		});
	</script>
<style>
#pdfViewer {
	width: 100%;
	max-width: 100%;
	border: 1px solid #ccc;
}

.col-8 {
	max-width: 100%;
	overflow: auto;
}
</style>
</head>

<body>
	<main>
		<div class="modal-dialog modal-dialog-centered">
			<button type="button" class="btn btn-primary" data-bs-toggle="modal"
				data-bs-target="#pdfModal">Preview PDF</button>
			<div class="modal fade" id="pdfModal" tabindex="-1"
				aria-labelledby="pdfModalLabel" aria-hidden="true">
				<div class="modal-dialog modal-dialog-centered">

					<div class="modal-content">
						<div class="modal-header">
							<h5 class="modal-title">
								<span>PDF Preview</span>
							</h5>
							<button type="button" class="btn-close" data-bs-dismiss="modal"
								aria-label="Close"></button>
						</div>
						<div class="modal-body">
							<div class="col-8 border border-primary">
								<canvas id="pdfViewer"></canvas>
							</div>
						</div>
						<div class="modal-footer">
							<button type="button" id="prevPage" title="previous"
								class="btn btn-secondary">&lt;&lt;</button>
							<button type="button" id="nextPage" title="next"
								class="btn btn-secondary">&gt;&gt;</button>
							<button type="button" class="btn btn-secondary"
								data-bs-dismiss="modal">X</button>
						</div>
					</div>
				</div>
			</div>
		</div>
	</main>
</body>

</html>
