
<!DOCTYPE html>
<!-- saved from url=(0052)https://getbootstrap.com/docs/5.0/examples/sidebars/ -->
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="">
<meta name="author"
	content="Mark Otto, Jacob Thornton, and Bootstrap contributors">
<meta name="generator" content="Hugo 0.84.0">
<title>Northwind Traders - Employee Reports</title>

<!-- Favicons -->
<link rel="icon"
	href="https://getbootstrap.com/docs/5.0/assets/img/favicons/favicon.ico">
<meta name="theme-color" content="#7952b3">

<!-- Custom styles for this template -->
<!-- Bootstrap core CSS -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">

</head>
<body>
	<main>
		<div class="container-fluid">
			<div class="row" id="navBarRow">
				<div class="col-12" id="navBarCol">
					<div th:replace="fragments/navbar :: nav"></div>
				</div>
			</div>
			<div class="row">
				<div class="row vh-100 p-4">
					<div class="col-2 bg-light border border-primary" id="leftSideBar">
						<div th:replace="fragments/sideMenuLeftReports :: div"></div>
					</div>
					<div class="col-8 border border-primary mt-5 pt-4">
						<div class="row">
							<table class="table table-bordered" id="dataTable">
								<tbody>
									<tr th:each="row : ${employees}">
										<th:block th:each="employee, iterStat : ${row}">
											<th:block>
												<td class="employee-cell"><img width="40px"
													height="70px"
													th:src="@{/images/{portraitPath}(portraitPath=${employee.portraitPath})}"
													class="employee-img" alt="Employee Photo" />
													<div class="employee-info">
														<p th:text="${employee.portraitTitle}">Employee Name</p>
														<p th:text="${employee.jobTitle}">Job Title</p>
													</div></td>
											</th:block>
											<th:block
												th:if="${iterStat.count == row.size} and ${row.size < chunkSize}">
												<!-- Fill empty cells for the last row if less than chunkSize employees -->
												<th:block
													th:each="i : ${#numbers.sequence(1, chunkSize - row.size)}">
													<td class="employee-cell"></td>
												</th:block>
											</th:block>
										</th:block>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
					<div class="col-2 bg-light border border-primary" id="rightSideBar">
						<div th:replace="fragments/sideMenuRight :: div"></div>
					</div>
				</div>
				<div class="row" id="footerRow">
					<div class="col-12" id="footerCol">
						<div th:replace="fragments/footer :: footer"></div>
					</div>
				</div>
			</div>
		</div>
	</main>

	<div th:replace="fragments/links-js:: linksJs"></div>

</body>
</html>
